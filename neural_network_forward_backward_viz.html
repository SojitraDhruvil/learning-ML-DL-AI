
<style>
  .nn-wrap { padding: 1rem 0 0; font-size: 13px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); transition: all .15s; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; font-weight: 500; }
  .info-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .info-chip { background: var(--color-background-secondary); border-radius: 6px; padding: 5px 10px; font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-mono); }
  .info-chip span { color: var(--color-text-primary); font-weight: 500; }
  .step-label { font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; min-height: 36px; line-height: 1.6; }
  .step-label strong { color: var(--color-text-primary); }
</style>

<div class="nn-wrap">
  <div class="controls">
    <button class="btn active" id="btn-reset" onclick="resetAll()">Reset</button>
    <button class="btn" id="btn-forward" onclick="runForward()">Forward pass ▶</button>
    <button class="btn" id="btn-backward" onclick="runBackward()">Backward pass ◀</button>
    <button class="btn" id="btn-auto" onclick="runAuto()">Auto play ⟳</button>
  </div>

  <div class="info-bar">
    <div class="info-chip">x = <span id="val-x">2.0</span></div>
    <div class="info-chip">w1 = <span id="val-w1">0.50</span></div>
    <div class="info-chip">w2 = <span id="val-w2">0.30</span></div>
    <div class="info-chip">ŷ = <span id="val-yhat">—</span></div>
    <div class="info-chip">Loss = <span id="val-loss">—</span></div>
  </div>

  <svg width="100%" viewBox="0 0 680 320" role="img">
    <title>Neural network visualization with forward and backward propagation</title>
    <desc>Interactive diagram showing a 2-layer neural network. Input node connects via w1 to hidden node, then via w2 to output node. Arrows animate during forward and backward passes.</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrow-back" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Layer labels -->
    <text class="ts" x="100" y="24" text-anchor="middle">Input layer</text>
    <text class="ts" x="300" y="24" text-anchor="middle">Hidden layer</text>
    <text class="ts" x="500" y="24" text-anchor="middle">Output layer</text>
    <text class="ts" x="620" y="24" text-anchor="middle">Loss</text>

    <!-- Forward arrows (default) -->
    <line id="arr-xh" x1="145" y1="160" x2="252" y2="160" stroke="var(--color-border-secondary)" stroke-width="2" marker-end="url(#arrow)"/>
    <line id="arr-ho" x1="348" y1="160" x2="452" y2="160" stroke="var(--color-border-secondary)" stroke-width="2" marker-end="url(#arrow)"/>
    <line id="arr-ol" x1="548" y1="160" x2="582" y2="160" stroke="var(--color-border-secondary)" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Back arrows (backprop) -->
    <line id="arr-lob" x1="582" y1="170" x2="548" y2="170" stroke="transparent" stroke-width="2" marker-end="url(#arrow)"/>
    <line id="arr-ohb" x1="452" y1="170" x2="348" y2="170" stroke="transparent" stroke-width="2" marker-end="url(#arrow)"/>
    <line id="arr-hxb" x1="252" y1="170" x2="145" y2="170" stroke="transparent" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Weight labels -->
    <rect id="w1-box" x="175" y="135" width="52" height="22" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text id="w1-lbl" class="ts" x="201" y="150" text-anchor="middle">w1=0.5</text>

    <rect id="w2-box" x="373" y="135" width="52" height="22" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text id="w2-lbl" class="ts" x="399" y="150" text-anchor="middle">w2=0.3</text>

    <!-- Input node -->
    <g id="node-x">
      <circle cx="100" cy="160" r="44" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
      <text class="th" x="100" y="153" text-anchor="middle" dominant-baseline="central">x</text>
      <text class="ts" x="100" y="170" text-anchor="middle">2.0</text>
    </g>

    <!-- Hidden node -->
    <g id="node-h">
      <circle cx="300" cy="160" r="44" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
      <text class="th" x="300" y="148" text-anchor="middle" dominant-baseline="central">h</text>
      <text id="h-val" class="ts" x="300" y="165" text-anchor="middle">x×w1</text>
      <text id="h-num" class="ts" x="300" y="180" text-anchor="middle" style="font-family:var(--font-mono)"></text>
    </g>

    <!-- Output node -->
    <g id="node-o">
      <circle cx="500" cy="160" r="44" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
      <text class="th" x="500" y="148" text-anchor="middle" dominant-baseline="central">ŷ</text>
      <text id="o-val" class="ts" x="500" y="165" text-anchor="middle">h×w2</text>
      <text id="o-num" class="ts" x="500" y="180" text-anchor="middle" style="font-family:var(--font-mono)"></text>
    </g>

    <!-- Loss box -->
    <g id="node-l">
      <rect x="590" y="130" width="68" height="60" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-secondary)" stroke-width="1"/>
      <text class="th" x="624" y="152" text-anchor="middle" dominant-baseline="central">L</text>
      <text id="l-val" class="ts" x="624" y="168" text-anchor="middle">(ŷ-y)²</text>
      <text id="l-num" class="ts" x="624" y="182" text-anchor="middle" style="font-family:var(--font-mono)"></text>
    </g>

    <!-- Gradient labels (hidden by default) -->
    <g id="grad-group" opacity="0">
      <rect x="355" y="186" width="84" height="20" rx="4" fill="var(--color-background-warning)" stroke="var(--color-border-warning)" stroke-width="0.5"/>
      <text id="grad-w2" class="ts" x="397" y="200" text-anchor="middle" style="fill:var(--color-text-warning)">dL/dw2=?</text>
      <rect x="153" y="186" width="84" height="20" rx="4" fill="var(--color-background-warning)" stroke="var(--color-border-warning)" stroke-width="0.5"/>
      <text id="grad-w1" class="ts" x="195" y="200" text-anchor="middle" style="fill:var(--color-text-warning)">dL/dw1=?</text>
    </g>

    <!-- y actual label -->
    <text class="ts" x="624" y="210" text-anchor="middle" style="fill:var(--color-text-secondary)">y=1.0</text>

    <!-- Annotation row -->
    <text id="ann-xh" class="ts" x="201" y="125" text-anchor="middle" opacity="0"></text>
    <text id="ann-ho" class="ts" x="399" y="125" text-anchor="middle" opacity="0"></text>
  </svg>

  <p class="step-label" id="step-text">Input x=2, weights w1=0.5, w2=0.3. <strong>Forward pass</strong> dabao — signal aage jayega!</p>
</div>

<script>
const x=2, y_true=1.0;
let w1=0.5, w2=0.3;
let autoTimer=null, autoStep=0;

const BLUE="#185FA5", AMBER="#BA7517", GREEN="#0F6E56", RED="#993C1D", GRAY="var(--color-border-secondary)";

function setStroke(id, color, width=2.5){
  const el=document.getElementById(id);
  if(el){ el.setAttribute('stroke', color); el.setAttribute('stroke-width', width); }
}
function setText(id, val){ const el=document.getElementById(id); if(el) el.textContent=val; }
function setOpacity(id, v){ const el=document.getElementById(id); if(el) el.setAttribute('opacity',v); }
function setNodeColor(id, color){
  const g=document.getElementById(id);
  if(!g) return;
  const circle=g.querySelector('circle')||g.querySelector('rect');
  if(circle) circle.setAttribute('stroke', color);
  if(circle) circle.setAttribute('stroke-width', color===GRAY?'1':'2.5');
}

function resetAll(){
  ['arr-xh','arr-ho','arr-ol'].forEach(id=>setStroke(id, GRAY, 2));
  ['arr-lob','arr-ohb','arr-hxb'].forEach(id=>setStroke(id,'transparent',2));
  ['node-x','node-h','node-o','node-l'].forEach(id=>setNodeColor(id, GRAY));
  setText('h-val','x×w1'); setText('h-num','');
  setText('o-val','h×w2'); setText('o-num','');
  setText('l-val','(ŷ-y)²'); setText('l-num','');
  setText('ann-xh',''); setOpacity('ann-xh',0);
  setText('ann-ho',''); setOpacity('ann-ho',0);
  setOpacity('grad-group',0);
  document.getElementById('val-yhat').textContent='—';
  document.getElementById('val-loss').textContent='—';
  document.getElementById('val-w1').textContent=w1.toFixed(2);
  document.getElementById('val-w2').textContent=w2.toFixed(2);
  setText('step-text','Input x=2, weights w1='+w1.toFixed(2)+', w2='+w2.toFixed(2)+'. <strong>Forward pass</strong> dabao — signal aage jayega!');
  document.getElementById('step-text').innerHTML='Input x=2, weights w1='+w1.toFixed(2)+', w2='+w2.toFixed(2)+'. <strong>Forward pass</strong> dabao — signal aage jayega!';
  ['btn-forward','btn-backward','btn-auto'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
}

function runForward(){
  const h=x*w1;
  const yhat=h*w2;
  const loss=Math.pow(yhat-y_true,2);

  setNodeColor('node-x', BLUE);
  setTimeout(()=>{
    setStroke('arr-xh', BLUE, 3);
    setText('ann-xh','x='+x); setOpacity('ann-xh',1);
  },200);
  setTimeout(()=>{
    setNodeColor('node-h', BLUE);
    setText('h-val','= x×w1'); setText('h-num','= '+h.toFixed(2));
  },600);
  setTimeout(()=>{
    setStroke('arr-ho', BLUE, 3);
    setText('ann-ho','h='+h.toFixed(2)); setOpacity('ann-ho',1);
  },1000);
  setTimeout(()=>{
    setNodeColor('node-o', BLUE);
    setText('o-val','= h×w2'); setText('o-num','= '+yhat.toFixed(2));
    document.getElementById('val-yhat').textContent=yhat.toFixed(3);
  },1400);
  setTimeout(()=>{
    setStroke('arr-ol', BLUE, 3);
  },1800);
  setTimeout(()=>{
    setNodeColor('node-l', RED);
    setText('l-val','('+yhat.toFixed(2)+'-1)²');
    setText('l-num','= '+loss.toFixed(3));
    document.getElementById('val-loss').textContent=loss.toFixed(4);
    document.getElementById('step-text').innerHTML='<strong>Forward pass complete!</strong> h='+h.toFixed(2)+', ŷ='+yhat.toFixed(2)+', Loss='+loss.toFixed(3)+'. Model ne predict kiya '+yhat.toFixed(2)+' lekin actual 1.0 hai — ab backward pass se weights update karo!';
  },2200);
  document.getElementById('btn-forward').classList.add('active');
}

function runBackward(){
  const h=x*w1;
  const yhat=h*w2;
  const loss=Math.pow(yhat-y_true,2);
  const dL_dyhat=2*(yhat-y_true);
  const dL_dw2=dL_dyhat*h;
  const dL_dw1=dL_dyhat*w2*x;
  const lr=0.1;
  const w1_new=w1-lr*dL_dw1;
  const w2_new=w2-lr*dL_dw2;

  setOpacity('grad-group',1);
  setNodeColor('node-l', AMBER);
  setTimeout(()=>{
    setStroke('arr-lob', AMBER, 2.5);
    setNodeColor('node-o', AMBER);
    setText('grad-w2','dL/dw2='+dL_dw2.toFixed(2));
  },400);
  setTimeout(()=>{
    setStroke('arr-ohb', AMBER, 2.5);
    setNodeColor('node-h', AMBER);
    setText('grad-w1','dL/dw1='+dL_dw1.toFixed(2));
  },1000);
  setTimeout(()=>{
    setStroke('arr-hxb', AMBER, 2.5);
    setNodeColor('node-x', AMBER);
  },1600);
  setTimeout(()=>{
    w1=w1_new; w2=w2_new;
    document.getElementById('val-w1').textContent=w1.toFixed(3);
    document.getElementById('val-w2').textContent=w2.toFixed(3);
    setText('w1-lbl','w1='+w1.toFixed(3));
    setText('w2-lbl','w2='+w2.toFixed(3));
    document.getElementById('w1-box').setAttribute('stroke','#BA7517');
    document.getElementById('w2-box').setAttribute('stroke','#BA7517');
    const newLoss=Math.pow(w2_new*w1_new*x - y_true,2);
    document.getElementById('step-text').innerHTML='<strong>Backward pass complete!</strong> Gradients: dL/dw1='+dL_dw1.toFixed(3)+', dL/dw2='+dL_dw2.toFixed(3)+'. Weights update: w1→'+w1.toFixed(3)+', w2→'+w2.toFixed(3)+'. Naya loss: '+newLoss.toFixed(4)+' (pehle '+loss.toFixed(4)+' tha). Reset karo aur ek aur step lagao!';
  },2200);
  document.getElementById('btn-backward').classList.add('active');
}

function runAuto(){
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; document.getElementById('btn-auto').classList.remove('active'); return; }
  document.getElementById('btn-auto').classList.add('active');
  resetAll();
  autoStep=0;
  function step(){
    if(autoStep===0){ runForward(); autoStep++; }
    else if(autoStep===1){ setTimeout(runBackward,2500); autoStep++; }
    else { clearInterval(autoTimer); autoTimer=null;
      setTimeout(()=>{ document.getElementById('btn-auto').classList.remove('active'); },500); }
  }
  step();
  autoTimer=setInterval(step, 5200);
}
</script>
